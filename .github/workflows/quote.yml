name: Generate Quote

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets/static

      - name: Download quote SVG
        run: |
          curl -L "https://quotes-github-readme.vercel.app/api?type=horizontal&theme=radical" -o assets/static/quote.svg

      - name: Commit quote
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/static/quote.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update quote.svg [skip ci]"
          git pull --rebase origin main
          git push origin main
