<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 600 70'
    style='background-color: #00000000;'
    width='600px' height='70px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d1.end'
                    dur='6000ms' fill='remove'
                    values='m0,42 h0 ; m0,42 h600 ; m0,42 h600 ; m0,42 h0' keyTimes='0;0.66666666666667;0.83333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#0EF732' font-size='30'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            Courses And Certificates Archive
        </textPath>
    </text>
        <path id='path1'>
                            <!-- Single line -->
                                <animate id='d1' attributeName='d' begin='d0.end'
                    dur='6000ms' fill='remove'
                    values='m0,42 h0 ; m0,42 h600 ; m0,42 h600 ; m0,42 h0' keyTimes='0;0.66666666666667;0.83333333333333;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#0EF732' font-size='30'
        dominant-baseline='auto'
        x='0%' text-anchor='start'
        letter-spacing='normal'>
        <textPath xlink:href='#path1'>
            Structured Learning Documentation
        </textPath>
    </text>
</svg>
